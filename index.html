<!DOCTYPE html>
<html>
<head>
  <title>Kaizen Knight</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;height:100vh;background:#222;display:flex;
      justify-content:center;align-items:center;font-family:'VT323', monospace;
    }

    .device{
      width:320px;height:560px;background:#d8d0b0;border:6px solid #111;
      border-radius:24px;padding:24px;box-sizing:border-box;box-shadow:0 8px 0 #111;
    }

    .screen{
      width:100%;height:360px;background:#e9ecd8;border:5px solid #111;
      display:flex;flex-direction:column;overflow:hidden;box-sizing:border-box;
    }

    .status-bar{
      height:34px;border-bottom:4px solid #111;display:flex;
      justify-content:center;align-items:center;font-size:22px;letter-spacing:2px;flex-shrink:0;
    }

    .play-area{
      flex:1;min-height:0;display:flex;flex-direction:column;
      justify-content:center;align-items:center;box-sizing:border-box;overflow:hidden;
    }

    .knight{font-size:52px;margin-bottom:10px;animation:bob 1.2s infinite steps(2)}
    @keyframes bob{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}

    .ground{width:90px;border-bottom:4px solid #111;margin-bottom:14px}

    .textbox{
      width:100%;background:#f8f8f8;border-top:4px solid #111;padding:10px;
      box-sizing:border-box;text-align:center;font-size:24px;line-height:1.05;
    }

    .checklist-wrapper{
      width:100%;height:100%;min-height:0;display:flex;flex-direction:column;background:#f8f8f8;
    }

    .check-title{
      text-align:center;font-size:24px;padding:5px;border-bottom:4px solid #111;flex-shrink:0;
    }

    .checklist{flex:1;min-height:0;overflow-y:auto;padding:6px 8px;box-sizing:border-box}

    .rule{
      display:flex;align-items:center;gap:7px;margin-bottom:4px;
      font-size:21px;line-height:.95;
    }

    .box{
      width:13px;height:13px;border:3px solid #111;background:#f8f8f8;
      flex-shrink:0;cursor:pointer;
    }

    .box.checked{background:#111}

    .check-buttons{
      border-top:4px solid #111;padding:6px;display:flex;gap:8px;
      flex-shrink:0;background:#f8f8f8;
    }

    .mini-btn{
      flex:1;height:32px;background:#111;color:white;border:none;
      font-family:'VT323', monospace;font-size:22px;cursor:pointer;
    }

    .week-row{margin-top:18px;display:flex;justify-content:space-between;gap:5px}

    .day{
      width:44px;height:30px;border:3px solid #111;background:#f8f8f8;
      font-size:18px;display:flex;justify-content:center;align-items:center;
    }

    .day.complete{background:#111;color:white}
    .day.failed{text-decoration:line-through}
    .day.today{outline:3px solid #111}
    .day.inactive{opacity:.35}

    .buttons{margin-top:22px;display:flex;justify-content:space-between;gap:8px}

    button{
      flex:1;height:42px;background:#111;color:white;border:none;
      font-family:'VT323', monospace;font-size:22px;box-shadow:0 4px 0 #333;cursor:pointer;
    }

    button:active{transform:translateY(3px);box-shadow:0 1px 0 #333}
  </style>
</head>

<body>

<div class="device">

  <div class="screen">
    <div class="status-bar">KAIZEN KNIGHT</div>
    <div class="play-area" id="playArea"></div>
  </div>

  <div class="week-row">
    <div class="day" id="day0">MON</div>
    <div class="day" id="day1">TUE</div>
    <div class="day" id="day2">WED</div>
    <div class="day" id="day3">THU</div>
    <div class="day" id="day4">FRI</div>
  </div>

  <div class="buttons">
    <button onclick="showChecklist()">CHECK</button>
    <button onclick="showWeek()">WEEK</button>
    <button onclick="resetWeek()">RESET</button>
  </div>

</div>

<script>
const rules=[
  "RISK SETTINGS LOCKED",
  "MAX 5 CONTRACTS",
  "JOURNALED TRADES",
  "3PM LOCK CHECK",
  "SECOND ACCT SAFE",
  "STOPPED PAST -250",
  "BOTH ACCTS JOURNALED",
  "NO REVENGE TRADING",
  "ROUTINE ONLY",
  "COMPOSURE KEPT"
];

const days=["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY"];
const shortDays=["MON","TUE","WED","THU","FRI"];

let todayIndex=getTradingDayIndex();
let weekKey=getWeekKey();
let state=loadState();

function getTradingDayIndex(){
  let d=new Date().getDay();
  if(d===0 || d===6) return -1;
  return d-1;
}

function getWeekKey(){
  let now=new Date();
  let day=now.getDay();
  let diff=now.getDate()-day+(day===0?-6:1);
  let monday=new Date(now.setDate(diff));
  return monday.toISOString().slice(0,10);
}

function freshState(){
  return{
    weekKey:weekKey,
    statuses:["inactive","inactive","inactive","inactive","inactive"],
    checks:Array.from({length:5},()=>Array(rules.length).fill(false))
  };
}

function loadState(){
  let saved=localStorage.getItem("kaizenKnight");
  if(!saved) return freshState();

  let parsed=JSON.parse(saved);
  if(parsed.weekKey!==weekKey) return freshState();

  return parsed;
}

function saveState(){
  localStorage.setItem("kaizenKnight",JSON.stringify(state));
}

function playBeep(freq=440,duration=100){
  const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const oscillator=audioCtx.createOscillator();
  const gainNode=audioCtx.createGain();

  oscillator.type="square";
  oscillator.frequency.value=freq;

  gainNode.gain.setValueAtTime(.08,audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration/1000);

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime+duration/1000);
}

function playVictory(){
  playBeep(523,120);
  setTimeout(()=>playBeep(659,120),140);
  setTimeout(()=>playBeep(784,220),280);
}

function playFailure(){
  playBeep(180,220);
}

function renderDays(){
  for(let i=0;i<5;i++){
    let el=document.getElementById("day"+i);
    el.className="day";

    if(state.statuses[i]==="complete") el.classList.add("complete");
    if(state.statuses[i]==="failed") el.classList.add("failed");
    if(state.statuses[i]==="inactive") el.classList.add("inactive");
    if(i===todayIndex) el.classList.add("today");
  }
}

function showMain(){
  renderDays();

  let now = new Date();

  let timeString = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  let dateString = now.toLocaleDateString([], {
    month: 'short',
    day: 'numeric'
  });

  if(todayIndex < 0){
    document.getElementById("playArea").innerHTML =
      "<div class='knight'>♞</div>" +
      "<div class='ground'></div>" +
      "<div class='textbox'>" +
      dateString + " • " + timeString +
      "<br>WEEKEND" +
      "<br>REST DAY" +
      "</div>";
    return;
  }

  let status = state.statuses[todayIndex];
  let text = "STEADY";
  let symbol = "♞";

  if(status === "complete"){
    text = "DAY LOCKED CLEAN";
    symbol = "♔";
  }

  if(status === "failed"){
    text = "INTEGRITY DAMAGED";
    symbol = "♜";
  }

  document.getElementById("playArea").innerHTML =
    "<div class='knight'>" + symbol + "</div>" +
    "<div class='ground'></div>" +
    "<div class='textbox'>" +
    dateString + " • " + timeString +
    "<br>" + days[todayIndex] +
    "<br>STATUS: " + text +
    "</div>";
}

function showChecklist(){
  if(todayIndex<0){
    showMain();
    return;
  }

  playBeep(500,80);

  let checks=state.checks[todayIndex];

  let html="";
  html+="<div class='checklist-wrapper'>";
  html+="<div class='check-title'>"+shortDays[todayIndex]+" VOW</div>";
  html+="<div class='checklist'>";

  for(let i=0;i<rules.length;i++){
    html+="<div class='rule'>";
    html+="<div class='box "+(checks[i]?"checked":"")+"' onclick='toggleRule("+i+")'></div>";
    html+="<div>"+rules[i]+"</div>";
    html+="</div>";
  }

  html+="</div>";
  html+="<div class='check-buttons'>";
  html+="<button class='mini-btn' onclick='lockInDay()'>LOCK</button>";
  html+="<button class='mini-btn' onclick='showMain()'>BACK</button>";
  html+="</div>";
  html+="</div>";

  document.getElementById("playArea").innerHTML=html;
}

function toggleRule(index){
  state.checks[todayIndex][index]=!state.checks[todayIndex][index];
  saveState();
  playBeep(620,60);
  showChecklist();
}

function lockInDay(){
  let checks=state.checks[todayIndex];
  let total=checks.filter(Boolean).length;
  let passed=total===rules.length;

  state.statuses[todayIndex]=passed?"complete":"failed";
  saveState();

  if(passed){playVictory()}else{playFailure()}

  document.getElementById("playArea").innerHTML =
    "<div class='knight'>"+(passed?"♔":"♜")+"</div>" +
    "<div class='ground'></div>" +
    "<div class='textbox'>" +
    "DAY LOCKED<br>"+total+"/10 RULES KEPT<br>"+
    (passed?"DISCIPLINE MAINTAINED":"INTEGRITY DAMAGED")+
    "</div>";

  renderDays();
}

function showWeek(){
  playBeep(380,80);
  renderDays();

  let clean=state.statuses.filter(s=>s==="complete").length;
  let failed=state.statuses.filter(s=>s==="failed").length;
  let active=state.statuses.filter(s=>s!=="inactive").length;

  document.getElementById("playArea").innerHTML =
    "<div class='knight'>♞</div>" +
    "<div class='ground'></div>" +
    "<div class='textbox'>" +
    "WEEK "+weekKey+"<br>"+
    "CLEAN:"+clean+" FAILED:"+failed+"<br>"+
    "ACTIVE DAYS:"+active+
    "</div>";
}

function resetWeek(){
  playBeep(220,140);
  state=freshState();
  saveState();
  showMain();
}

showMain();
</script>

</body>
</html>
